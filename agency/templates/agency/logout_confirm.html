{% extends 'agency/base.html' %}

{% block title %}Выход - AdAgency Pink{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="fade-up">
    <div class="col-md-6">
        <div class="card text-center">
            <div class="card-header">
                <h3 class="mb-0"><i class="fas fa-sign-out-alt"></i> Выход из аккаунта</h3>
            </div>
            <div class="card-body py-5">
                <i class="fas fa-question-circle fa-4x" style="color: #ff69b4; margin-bottom: 20px;"></i>
                <h4 class="mb-4">Вы уверены, что хотите выйти?</h4>

                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'logout' %}" class="btn btn-custom">
                        <i class="fas fa-check"></i> Да, выйти
                    </a>
                    <a href="javascript:history.back()" class="btn btn-outline-pink">
                        <i class="fas fa-times"></i> Остаться
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
