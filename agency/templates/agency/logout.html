{% extends 'agency/base.html' %}

{% block title %}Выход - AdAgency Pink{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="fade-up">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center">
                <h3 class="mb-0"><i class="fas fa-sign-out-alt"></i> Выход из аккаунта</h3>
            </div>
            <div class="card-body text-center p-5">
                <i class="fas fa-heart fa-4x" style="color: #ffb6c1; margin-bottom: 20px;"></i>
                <h4 class="pink-gradient-text mb-3">Вы уверены, что хотите выйти?</h4>
                <p class="text-muted mb-4">После выхода вы сможете зайти под другим пользователем</p>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-custom">
                            <i class="fas fa-check"></i> Да, выйти
                        </button>
                        <a href="javascript:history.back()" class="btn btn-outline-pink">
                            <i class="fas fa-times"></i> Остаться
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
