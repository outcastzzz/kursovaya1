{% extends 'agency/base.html' %}

{% block title %}Выход - AdAgency Pink{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="fade-up">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center">
                <h3 class="mb-0"><i class="fas fa-check-circle"></i> Вы вышли из системы</h3>
            </div>
            <div class="card-body text-center p-5">
                <i class="fas fa-heart fa-4x" style="color: #ffb6c1; margin-bottom: 20px;"></i>
                <p class="lead mb-4">Спасибо, что были с нами! Ждем вас снова ❤️</p>
                <a href="/" class="btn btn-custom">
                    <i class="fas fa-home"></i> На главную
                </a>
                <a href="{% url 'login' %}" class="btn btn-outline-pink ms-2">
                    <i class="fas fa-sign-in-alt"></i> Войти снова
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
